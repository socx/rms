name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── API integration tests (Node / Jest) ────────────────────────────────────
  # Runs on every push to main and every PR targeting main.
  api-tests:
    name: API tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER:     ${{ secrets.CI_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          POSTGRES_DB:       ${{ secrets.CI_DB_NAME }}
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
      JWT_SECRET:   ${{ secrets.CI_JWT_SECRET }}
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies (worker)
        run: pip install -r apps/worker/requirements.txt

      - name: Apply database schema
        env:
          PGPASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          CI_DB_USER: ${{ secrets.CI_DB_USER }}
          CI_DB_NAME: ${{ secrets.CI_DB_NAME }}
        run: |
          psql -h localhost -U "$CI_DB_USER" -d "$CI_DB_NAME" -f infra/rms_001_initial_schema.sql
          psql -h localhost -U "$CI_DB_USER" -d "$CI_DB_NAME" -f infra/rms_002_email_outbox.sql
          psql -h localhost -U "$CI_DB_USER" -d "$CI_DB_NAME" -f infra/rms_003_revoked_tokens.sql
          psql -h localhost -U "$CI_DB_USER" -d "$CI_DB_NAME" -f infra/rms_004_dispatch_retry_after.sql
          psql -h localhost -U "$CI_DB_USER" -d "$CI_DB_NAME" -f infra/rms_005_super_admin_audit.sql
          psql -h localhost -U "$CI_DB_USER" -d "$CI_DB_NAME" -c "UPDATE system_settings SET value = 'true' WHERE key = 'allow_public_registration';"

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Run API tests
        run: npm test --workspace=apps/api

  # ── Python worker unit tests ──────────────────────────────────────────────
  worker-tests:
    name: Worker tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/worker/requirements.txt pytest

      - name: Run worker tests
        working-directory: apps/worker
        run: pytest -q tests/

  # ── React web build ───────────────────────────────────────────────────────
  # Build on every event so PRs catch build failures.
  # The dist artifact is consumed by the deploy job (push to main only).
  build-web:
    name: Build web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - name: Build web
        run: npm run build:web
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: web-dist
          path: apps/web/dist/

  # ── Deploy to DigitalOcean droplet ────────────────────────────────────────
  # Only runs when code is merged/pushed to main — never on PRs.
  # All three test/build jobs must pass first.
  deploy:
    name: Deploy
    needs: [api-tests, worker-tests, build-web]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev-lab-01

    steps:
      - uses: actions/checkout@v6.0.2

      # Download the React build produced by build-web above
      - uses: actions/download-artifact@v8.0.1
        with: { name: web-dist, path: apps/web/dist }

      # SSH in: pull code, reinstall deps, regenerate Prisma client,
      # reload the API (PM2) and restart the dispatch engine (Supervisor).
      - name: Deploy API and worker
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ENV_FILE:    ${{ secrets.ENV_FILE }}
        with:
          host:     ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key:      ${{ secrets.DROPLET_SSH_KEY }}
          envs:     DEPLOY_PATH,ENV_FILE
          script: |
            set -e
            cd "$DEPLOY_PATH"

            echo "--- Writing .env ---"
            # ENV_FILE secret is base64-encoded to survive multi-line transport over SSH.
            # Encode locally: cat .env | base64 -w 0   (then paste the result as the secret)
            echo "$ENV_FILE" | base64 -d > "$DEPLOY_PATH/.env.tmp"
            chmod 600 "$DEPLOY_PATH/.env.tmp"
            mv -f "$DEPLOY_PATH/.env.tmp" "$DEPLOY_PATH/.env"

            echo "--- Pulling latest code ---"
            git pull origin main

            echo "--- Installing Node dependencies ---"
            npm ci

            echo "--- Regenerating Prisma client ---"
            npx prisma generate --schema=packages/db/prisma/schema.prisma

            echo "--- Applying database migrations ---"
            DB_URL=$(grep '^DATABASE_URL=' "$DEPLOY_PATH/.env" | cut -d= -f2-)

            # rms_001 is not idempotent (plain CREATE TYPE/TABLE/INDEX/TRIGGER).
            # Only run it on a completely empty database to avoid errors on re-deploy.
            SCHEMA_EXISTS=$(psql "$DB_URL" -tAc "SELECT to_regclass('public.users')" 2>/dev/null || echo "")
            if [ -z "$SCHEMA_EXISTS" ]; then
                echo "    Fresh database — applying initial schema (rms_001)..."
                psql "$DB_URL" -v ON_ERROR_STOP=1 -f infra/rms_001_initial_schema.sql
            else
                echo "    Schema already exists — skipping rms_001."
            fi

            # rms_002-004 are idempotent (IF NOT EXISTS / IF EXISTS guards) — always safe to re-run.
            psql "$DB_URL" -v ON_ERROR_STOP=1 -f infra/rms_002_email_outbox.sql
            psql "$DB_URL" -v ON_ERROR_STOP=1 -f infra/rms_003_revoked_tokens.sql
            psql "$DB_URL" -v ON_ERROR_STOP=1 -f infra/rms_004_dispatch_retry_after.sql
            psql "$DB_URL" -c "UPDATE system_settings SET value='true' WHERE key='allow_public_registration';"

            # rms_005 adds new enum values and the audit_logs table.
            # ALTER TYPE requires the type owner (postgres). The deploy user has a
            # narrow sudoers entry allowing passwordless: sudo -u postgres psql
            # (see infra/README or onboarding docs for the one-time server setup).
            DB_NAME=$(psql "$DB_URL" -tAc "SELECT current_database()")
            sudo -u postgres psql -d "$DB_NAME" -v ON_ERROR_STOP=1 -f infra/rms_005_super_admin_audit.sql

            echo "--- Installing Python dependencies ---"
            [ -d .venv ] || python3 -m venv .venv
            .venv/bin/pip install -r apps/worker/requirements.txt

            echo "--- Reloading API server (PM2) ---"
            pm2 startOrReload "$DEPLOY_PATH/infra/pm2/ecosystem.config.cjs" --env production --update-env

            echo "--- Restarting dispatch engine (Supervisor) ---"
            sudo supervisorctl reread
            sudo supervisorctl update
            sudo supervisorctl restart rms-worker || sudo supervisorctl start rms-worker

            echo "--- Deployment complete ---"

      # Copy the React SPA dist to the nginx static root
      - name: Copy web build to droplet
        uses: appleboy/scp-action@v1.0.0
        with:
          host:             ${{ secrets.DROPLET_HOST }}
          username:         ${{ secrets.DROPLET_USER }}
          key:              ${{ secrets.DROPLET_SSH_KEY }}
          source:           apps/web/dist/*
          target:           /var/www/rms
          strip_components: 3
