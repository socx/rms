# Nginx configuration for RMS
# Place in /etc/nginx/sites-available/rms and symlink to sites-enabled/

server {
    listen 80;
    server_name __APP_DOMAIN_HOST__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name __APP_DOMAIN_HOST__;

    ssl_certificate     /etc/letsencrypt/live/__APP_DOMAIN_HOST__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__APP_DOMAIN_HOST__/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # API — proxy to Express
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check — proxy to Express
    location /health {
        proxy_pass http://127.0.0.1:3000;
    }

    # React SPA — serve static build
    location / {
        root  /var/www/rms;
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA fallback
    }
}
