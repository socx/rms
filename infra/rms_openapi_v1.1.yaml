                $ref: '#/components/schemas/ErrorEnvelope'

  # ── ADMIN ────────────────────────────────────────────────────
  /admin/settings:
    get:
      tags: [admin]
      summary: List all system settings
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        '200':
          description: All system settings.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SystemSetting'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/settings/{key}:
    patch:
      tags: [admin]
      summary: Update a system setting
      description: |
        Updates a system setting value.
        `dispatch_poll_interval_seconds`: validated between 10 and 3600. Takes effect within one poll cycle — no restart required.
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
            example: dispatch_poll_interval_seconds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: string
                  example: "30"
      responses:
        '200':
          description: Setting updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SystemSetting'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Setting key not found.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /admin/users:
    get:
      tags: [admin]
      summary: List all users (admin)
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: q
          in: query
          description: Search by name or email.
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserStatus'
        - name: system_role
          in: query
          schema:
            $ref: '#/components/schemas/SystemRole'
      responses:
        '200':
          description: Paginated user list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
